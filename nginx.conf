server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API 反向代理到 api.gitcc.com：正则匹配 + 变量 proxy_pass，确保 POST 被转发（不用 if，避免影响 proxy）
    # 角色/场景 图片生成请求体含 base64 图，需放宽 body 限制（默认 1m 易导致 502）
    # 使用变量 proxy_pass 时，Nginx 在请求时解析域名，必须显式配置 resolver，否则会报 no resolver defined
    location ~ ^/api-proxy/(.*)$ {
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        client_max_body_size 50m;
        set $path $1;
        proxy_pass http://api.gitcc.com/$path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host api.gitcc.com;
        proxy_set_header Origin "http://api.gitcc.com";
        proxy_set_header Referer "http://api.gitcc.com/";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        # 勿把客户端 Content-Type 原样转给上游：GET 下载视频时常无此头，空值可能导致上游异常→502
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        add_header Access-Control-Allow-Origin $http_origin always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
