services:
  ai-manga-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-manga-studio:latest
    container_name: ai-manga-studio-app
    ports:
      - "3005:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - ai-manga-studio-network

networks:
  ai-manga-studio-network:
    driver: bridge
